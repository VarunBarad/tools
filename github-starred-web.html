<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Starred Repos</title>
<link
    rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>"
/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle { color: #8b949e; font-size: 0.9rem; margin-bottom: 2rem; }
  .controls { display: flex; gap: 0.5rem; margin-bottom: 2rem; width: 100%; max-width: 540px; }
  input { flex: 1; padding: 0.55rem 0.9rem; border-radius: 8px; border: 1px solid #30363d; background: #161b22; color: #e6edf3; font-size: 0.95rem; outline: none; }
  input:focus { border-color: #58a6ff; }

  button { padding: 0.55rem 1.2rem; border-radius: 8px; border: none; background: #238636; color: #fff; font-size: 0.95rem; cursor: pointer; font-weight: 500; white-space: nowrap; }
  button:hover { background: #2ea043; }
  button:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
  #results { width: 100%; max-width: 540px; display: flex; flex-direction: column; gap: 0.75rem; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 1rem 1.1rem; }
  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.35rem; }
  .repo-name { font-weight: 600; font-size: 1rem; color: #58a6ff; text-decoration: none; }
  .repo-name:hover { text-decoration: underline; }
  .stars { display: flex; align-items: center; gap: 0.3rem; font-size: 0.82rem; color: #8b949e; white-space: nowrap; }
  .star-icon { color: #e3b341; font-size: 0.9rem; }
  .desc { font-size: 0.875rem; color: #8b949e; line-height: 1.5; }
  .lang { display: inline-block; margin-top: 0.5rem; font-size: 0.78rem; color: #8b949e; background: #21262d; border-radius: 20px; padding: 2px 10px; }
  .status { color: #8b949e; font-size: 0.9rem; text-align: center; padding: 1rem 0; }
  .error { color: #f85149; font-size: 0.9rem; text-align: center; padding: 1rem 0; }
</style>
</head>
<body>
<h1>Random Starred Repos</h1>
<p class="subtitle">Discover 5 random repositories starred by any GitHub user</p>

<div class="controls">
  <input type="text" id="username" placeholder="GitHub username" />
  <button id="btn" onclick="fetchRepos()">Fetch</button>
</div>

<div id="results"></div>

<script>
const PICK_COUNT = 5;
const LS_KEY = "gh_starred_username";
const usernameInput = document.getElementById("username");

usernameInput.value = localStorage.getItem(LS_KEY) || "torvalds";

async function apiGet(url) {
  const res = await fetch(url, { headers: { "User-Agent": "random-starred-page" } });
  if (!res.ok) throw new Error(`GitHub API error: ${res.status} ${res.statusText}`);
  return { data: await res.json(), headers: res.headers };
}

function parseLastPage(linkHeader) {
  if (!linkHeader) return 1;
  for (const part of linkHeader.split(",")) {
    if (part.includes('rel="last"')) {
      const url = part.split(";")[0].trim().replace(/[<>]/g, "");
      const match = url.match(/[?&]page=(\d+)/);
      if (match) return parseInt(match[1]);
    }
  }
  return 1;
}

function sample(arr, n) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy.slice(0, n);
}

function renderCard(repo) {
  return `<div class="card">
    <div class="card-top">
      <a class="repo-name" href="${repo.html_url}" target="_blank">${repo.full_name}</a>
      <span class="stars"><span class="star-icon">&#9733;</span>${repo.stargazers_count.toLocaleString()}</span>
    </div>
    <p class="desc">${repo.description || '<em>No description</em>'}</p>
    ${repo.language ? `<span class="lang">${repo.language}</span>` : ""}
  </div>`;
}

async function fetchRepos() {
  const username = usernameInput.value.trim();
  const btn = document.getElementById("btn");
  const results = document.getElementById("results");

  if (!username) return;

  localStorage.setItem(LS_KEY, username);
  btn.disabled = true;
  results.innerHTML = `<p class="status">Fetching starred repos for <strong>${username}</strong>...</p>`;

  try {
    const { headers } = await apiGet(
      `https://api.github.com/users/${username}/starred?per_page=1`
    );
    const total = parseLastPage(headers.get("Link"));

    if (total === 0) {
      results.innerHTML = `<p class="status">${username} has no starred repositories.</p>`;
      return;
    }

    const indices = sample([...Array(total)].map((_, i) => i + 1), Math.min(PICK_COUNT, total));

    results.innerHTML = `<p class="status">Loading ${indices.length} random repos out of ${total}...</p>`;

    const repos = await Promise.all(
      indices.map(async idx => {
        const { data } = await apiGet(
          `https://api.github.com/users/${username}/starred?per_page=1&page=${idx}`
        );
        return data[0];
      })
    );

    results.innerHTML = repos.map(renderCard).join("");
  } catch (err) {
    results.innerHTML = `<p class="error">${err.message}</p>`;
  } finally {
    btn.disabled = false;
  }
}

document.getElementById("username").addEventListener("keydown", e => {
  if (e.key === "Enter") fetchRepos();
});

fetchRepos();
</script>
</body>
</html>
