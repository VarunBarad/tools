<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HFW Quest Tracker</title>
  <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏹</text></svg>"
  />
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --accent: #c0823a;
      --done: #2ea043;
      --text: #e6edf3;
      --muted: #8b949e;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
      min-height: 100vh;
    }
    
    header {
      background: linear-gradient(135deg, #1a0e00 0%, #0d1117 60%);
      border-bottom: 1px solid var(--accent);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    header h1 {
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .stats-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat .n {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
    }
    
    .stat .l {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .progress-wrap {
      width: 180px;
    }
    
    .progress-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }
    
    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #f0a040);
      border-radius: 3px;
      transition: width 0.4s;
    }
    
    .toolbar {
      padding: 12px 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .toolbar input {
      flex: 1;
      min-width: 160px;
      padding: 7px 12px;
      border-radius: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.85rem;
    }
    
    .toolbar input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .filter-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    
    .fbtn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .fbtn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .fbtn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
      font-weight: 600;
    }
    
    .btn-clear {
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-clear:hover {
      border-color: #f85149;
      color: #f85149;
    }
    
    .btn-export {
      margin-left: auto;
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .btn-export:hover {
      background: var(--accent);
      color: #ffffff;
    }
    
    main {
      padding: 20px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .category-section {
      margin-bottom: 28px;
    }
    
    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px 8px 0 0;
      user-select: none;
    }
    
    .category-header:hover {
      border-color: var(--accent);
    }
    
    .cat-title {
      font-weight: 600;
      font-size: 0.95rem;
      flex: 1;
    }
    
    .cat-progress {
      font-size: 0.75rem;
      color: var(--muted);
    }
    
    .collapse-icon {
      color: var(--muted);
      transition: transform 0.25s;
      font-size: 0.8rem;
    }
    
    .collapsed .collapse-icon {
      transform: rotate(-90deg);
    }
    
    .collapsed + .quest-grid {
      display: none;
    }
    
    .type-tag {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    
    .quest-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 8px;
      overflow: hidden;
    }
    
    .quest-item {
      background: var(--card);
      padding: 10px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    
    .quest-item:hover {
      background: #1e2530;
    }
    
    .quest-item.done {
      background: #0d1f0e;
    }
    
    .quest-item.done:hover {
      background: #112214;
    }
    
    .checkbox {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: all 0.2s;
    }
    
    .done .checkbox {
      background: var(--done);
      border-color: var(--done);
    }
    
    .checkmark {
      display: none;
      color: #ffffff;
      font-size: 11px;
      font-weight: 700;
    }
    
    .done .checkmark {
      display: block;
    }
    
    .quest-name {
      font-size: 0.85rem;
      font-weight: 500;
      line-height: 1.3;
    }
    
    .done .quest-name {
      color: var(--muted);
      text-decoration: line-through;
    }
    
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 48px;
      font-size: 0.9rem;
    }
    
    footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 0.72rem;
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }
    
    /* Export modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal-overlay.open {
      display: flex;
    }
    
    .modal {
      background: var(--card);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 24px;
      max-width: 540px;
      width: 90%;
      text-align: center;
    }
    
    .modal h2 {
      color: var(--accent);
      margin-bottom: 6px;
      font-size: 1.1rem;
    }
    
    .modal p {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 16px;
    }
    
    .modal canvas {
      border-radius: 8px;
      max-width: 100%;
      border: 1px solid var(--border);
    }
    
    .modal-btns {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 16px;
    }
    
    .modal-btns button {
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-dl {
      background: var(--accent);
      border: none;
      color: #ffffff;
      font-weight: 600;
    }
    
    .btn-dl:hover {
      background: #d4922a;
    }
    
    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    
    .btn-cancel:hover {
      border-color: #f85149;
      color: #f85149;
    }
    
    @media (max-width: 600px) {
      header, main, .toolbar {
        padding-left: 12px;
        padding-right: 12px;
      }
      
      .progress-wrap {
        width: 140px;
      }
    }
  </style>
</head>
<body>
<header>
  <h1>🏹 Horizon Forbidden West — Quest Tracker</h1>
  <div class="stats-bar">
    <div class="stat">
      <div class="n" id="s-done">0</div>
      <div class="l">Done</div>
    </div>
    <div class="stat">
      <div class="n" id="s-total">0</div>
      <div class="l">Total</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Overall Progress</span><span id="s-pct">0%</span>
      </div>
      <div class="progress-bar">
        <div
            class="progress-fill"
            id="s-bar"
            style="width: 0%"
        ></div>
      </div>
    </div>
  </div>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="🔍  Search quests…" oninput="render()">
  <div class="filter-btns" id="filters"></div>
  <button class="btn-clear" onclick="clearAll()">Reset All</button>
  <button class="btn-export" onclick="openExport()">📸 Export Image</button>
</div>

<main id="main-content"></main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>📸 Week Notes Export</h2>
    <p>A landscape snapshot of your current progress — ready to drop into your blog.</p>
    <canvas id="export-canvas"></canvas>
    <div class="modal-btns">
      <button class="btn-dl" onclick="downloadImg()">↓ Download Image</button>
      <button class="btn-cancel" onclick="closeExport()">Cancel</button>
    </div>
  </div>
</div>

<footer>Progress is saved in your browser. Spoiler-safe — quest titles only, no descriptions.</footer>

      quests: [

      quests: [

      ],

    {
      key: "hunting-ground",
      label: "Hunting Grounds",
      icon: "🎯",
      tag: "Hunting",
      color: "#56d364",
      bg: "#0f2318",
      quests: [
        "Hunting Ground: The Daunt – Trial 1",
        "Hunting Ground: The Daunt – Trial 2",
        "Hunting Ground: The Daunt – Trial 3",
        "Hunting Ground: Plainsong – Trial 1",
        "Hunting Ground: Plainsong – Trial 2",
        "Hunting Ground: Plainsong – Trial 3",
        "Hunting Ground: Sheerside Mountains – Trial 1",
        "Hunting Ground: Sheerside Mountains – Trial 2",
        "Hunting Ground: Sheerside Mountains – Trial 3",
        "Hunting Ground: The Raintrace – Trial 1",
        "Hunting Ground: The Raintrace – Trial 2",
        "Hunting Ground: The Raintrace – Trial 3",
      ],
    },
    {
      key: "gauntlet",
      label: "Gauntlet Runs",
      icon: "🏁",
      tag: "Gauntlet",
      color: "#d2a8ff",
      bg: "#1e1030",
      quests: [
        "Gauntlet Run: Dry Yearn",
        "Gauntlet Run: Cliffs of the Cry",
        "Gauntlet Run: Bonewhite Tear",
        "Gauntlet Run: The Stillsands",
      ],
    },
  ];
  
  // Flatten all quests
  const ALL = [];
  CATEGORIES.forEach((cat) =>
      cat.quests.forEach((q) =>
          ALL.push({id: cat.key + "::" + q, name: q, key: cat.key}),
      ),
  );
  
  // Filter buttons config
  const FILTERS = [
    {f: "all", label: "All"},
    {f: "main", label: "🗺️ Main"},
    {f: "side", label: "📜 Side"},
    {f: "errand", label: "📌 Errands"},
    {f: "rebel-camp", label: "🔴 Rebel Camps"},
    {f: "rebel-outpost", label: "🏕️ Outposts"},
    {f: "salvage", label: "🔧 Salvage"},
    {f: "cauldron", label: "🔩 Cauldrons"},
    {f: "tallneck", label: "🦒 Tallnecks"},
    {f: "relic-ruin", label: "🏛️ Relic Ruins"},
    {f: "melee-pit", label: "🥊 Melee Pits"},
    {f: "hunting-ground", label: "🎯 Hunting"},
    {f: "gauntlet", label: "🏁 Gauntlet"},
    {f: "incomplete", label: "⬜ Incomplete"},
    {f: "complete", label: "✅ Complete"},
  ];
  
  // Build filter buttons
  const fb = document.getElementById("filters");
  FILTERS.forEach(({f, label}) => {
    const b = document.createElement("button");
    b.className = "fbtn" + (f === "all" ? " active" : "");
    b.dataset.f = f;
    b.textContent = label;
    b.onclick = () => setFilter(f);
    fb.appendChild(b);
  });
  
  let done = new Set(
      JSON.parse(localStorage.getItem("hfw_done") || "[]"),
  );
  let filter = "all";
  
  function save() {
    localStorage.setItem("hfw_done", JSON.stringify([...done]));
  }
  
  function toggle(id) {
    done.has(id) ? done.delete(id) : done.add(id);
    save();
    render();
  }
  
  function clearAll() {
    if (confirm("Reset ALL progress?")) {
      done.clear();
      save();
      render();
    }
  }
  
  function setFilter(f) {
    filter = f;
    document
        .querySelectorAll(".fbtn")
        .forEach((b) =>
            b.classList.toggle("active", b.dataset.f === f),
        );
    render();
  }
  
  function render() {
    const q = document.getElementById("search").value.toLowerCase();
    
    const visible = ALL.filter((item) => {
      if (q && !item.name.toLowerCase().includes(q)) return false;
      if (filter === "incomplete") return !done.has(item.id);
      if (filter === "complete") return done.has(item.id);
      if (filter !== "all") return item.key === filter;
      return true;
    });
    
    // Stats
    const pct = ALL.length
        ? Math.round((done.size / ALL.length) * 100)
        : 0;
    document.getElementById("s-done").textContent = done.size;
    document.getElementById("s-total").textContent = ALL.length;
    document.getElementById("s-pct").textContent = pct + "%";
    document.getElementById("s-bar").style.width = pct + "%";
    
    // Group by category key, preserving CATEGORIES order
    const grouped = {};
    visible.forEach((item) => {
      (grouped[item.key] = grouped[item.key] || []).push(item);
    });
    
    const mc = document.getElementById("main-content");
    if (!Object.keys(grouped).length) {
      mc.innerHTML = '<div class="empty-state">No quests found. Try a different search or filter.</div>';
      return;
    }
    
    mc.innerHTML = "";
    const collapsed = JSON.parse(
        sessionStorage.getItem("hfw_col") || "{}",
    );
    
    CATEGORIES.forEach((cat) => {
      const items = grouped[cat.key];
      if (!items) return;
      
      const catDone = items.filter((i) => done.has(i.id)).length;
      const isCollapsed = collapsed[cat.key];
      
      const sec = document.createElement("div");
      sec.className = "category-section";
      
      const hdr = document.createElement("div");
      hdr.className =
          "category-header" + (isCollapsed ? " collapsed" : "");
      hdr.innerHTML = `
      <span class="cat-title">${cat.icon} ${cat.label}</span>
      <span class="cat-progress">${catDone}/${items.length}</span>
      <span class="type-tag" style="background:${cat.bg};color:${cat.color}">${cat.tag}</span>
      <span class="collapse-icon">▾</span>
    `;
      hdr.onclick = () => {
        hdr.classList.toggle("collapsed");
        const col = JSON.parse(
            sessionStorage.getItem("hfw_col") || "{}",
        );
        col[cat.key] = hdr.classList.contains("collapsed");
        sessionStorage.setItem("hfw_col", JSON.stringify(col));
      };
      
      const grid = document.createElement("div");
      grid.className = "quest-grid";
      items.forEach((item) => {
        const isDone = done.has(item.id);
        const div = document.createElement("div");
        div.className = "quest-item" + (isDone ? " done" : "");
        div.innerHTML = `<div class="checkbox"><span class="checkmark">✓</span></div><div class="quest-name">${item.name}</div>`;
        div.onclick = () => toggle(item.id);
        grid.appendChild(div);
      });
      
      sec.appendChild(hdr);
      sec.appendChild(grid);
      mc.appendChild(sec);
    });
  }
  
  // ── Export ────────────────────────────────────────────────────────────────────
  function openExport() {
    drawExportCanvas();
    document.getElementById('modal').classList.add('open');
  }
  
  function closeExport() {
    document.getElementById('modal').classList.remove('open');
  }
  
  function drawExportCanvas() {
    const W = 1200, PAD = 36, COL_GAP = 20, ROW_GAP = 16;
    const COLS = 4;
    const colW = (W - PAD * 2 - COL_GAP * (COLS - 1)) / COLS;
    
    // Pre-measure rows per category
    const catData = CATEGORIES.map(cat => {
      const total = cat.quests.length;
      const doneN = cat.quests.filter(q => done.has(cat.key + '::' + q)).length;
      return {cat, total, doneN, pct: total ? doneN / total : 0};
    });
    
    // Layout into columns (simple bin-packing: fill columns evenly by item count)
    // Each category card = header(52) + bar(24) + items*18 + padding(16)
    const cardHeight = d => 52 + 24 + d.total * 18 + 20;
    const columns = Array.from({length: COLS}, () => ({items: [], h: 0}));
    catData.forEach(d => {
      const shortest = columns.reduce((a, b) => a.h <= b.h ? a : b);
      shortest.items.push(d);
      shortest.h += cardHeight(d) + ROW_GAP;
    });
    
    const maxColH = Math.max(...columns.map(c => c.h));
    const HEADER_H = 80;
    const H = HEADER_H + PAD + maxColH + PAD;
    
    const canvas = document.getElementById('export-canvas');
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');
    
    // Background
    const bgGrad = ctx.createLinearGradient(0, 0, W, H);
    bgGrad.addColorStop(0, '#1a0e00');
    bgGrad.addColorStop(0.4, '#0d1117');
    bgGrad.addColorStop(1, '#0d1117');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);
    
    // Subtle grid texture
    ctx.strokeStyle = 'rgba(192,130,58,0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = 0; y < H; y += 40) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
    
    // Header bar
    ctx.fillStyle = 'rgba(192,130,58,0.12)';
    roundRect(ctx, 0, 0, W, HEADER_H, 0);
    ctx.fill();
    ctx.strokeStyle = '#c0823a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, HEADER_H);
    ctx.lineTo(W, HEADER_H);
    ctx.stroke();
    
    // Title
    ctx.fillStyle = '#c0823a';
    ctx.font = 'bold 26px Segoe UI, sans-serif';
    ctx.fillText('🏹 Horizon Forbidden West — Quest Tracker', PAD, 34);
    
    // Date
    const dateStr = new Date().toLocaleDateString('en-GB', {day: 'numeric', month: 'long', year: 'numeric'});
    ctx.fillStyle = '#8b949e';
    ctx.font = '14px Segoe UI, sans-serif';
    ctx.fillText(dateStr, PAD, 58);
    
    // Overall progress (right side of header)
    const totalAll = ALL.length, doneAll = done.size;
    const overallPct = totalAll ? doneAll / totalAll : 0;
    const barW = 260, barH = 10;
    const barX = W - PAD - barW;
    
    // Label
    ctx.fillStyle = '#8b949e';
    ctx.font = '12px Segoe UI, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('Overall Progress', W - PAD, 22);
    
    // Count + pct
    ctx.fillStyle = '#c0823a';
    ctx.font = 'bold 20px Segoe UI, sans-serif';
    ctx.fillText(`${doneAll} / ${totalAll}  (${Math.round(overallPct * 100)}%)`, W - PAD, 46);
    ctx.textAlign = 'left';
    
    // Progress bar — sits below the text with clear spacing
    const barY = 54;
    ctx.fillStyle = '#30363d';
    roundRect(ctx, barX, barY, barW, barH, 5);
    ctx.fill();
    if (overallPct > 0) {
      const grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
      grad.addColorStop(0, '#c0823a');
      grad.addColorStop(1, '#f0a040');
      ctx.fillStyle = grad;
      roundRect(ctx, barX, barY, barW * overallPct, barH, 5);
      ctx.fill();
    }
    
    // Draw category cards
    let colXs = columns.map((_, i) => PAD + i * (colW + COL_GAP));
    let colYs = columns.map(() => HEADER_H + PAD);
    
    columns.forEach((col, ci) => {
      let y = colYs[ci];
      col.items.forEach(d => {
        const ch = cardHeight(d);
        drawCategoryCard(ctx, colXs[ci], y, colW, ch, d);
        y += ch + ROW_GAP;
      });
    });
    
    
  }
  
  function drawCategoryCard(ctx, x, y, w, h, {cat, total, doneN, pct}) {
    // Card background
    ctx.fillStyle = '#161b22';
    roundRect(ctx, x, y, w, h, 8);
    ctx.fill();
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 1;
    roundRect(ctx, x, y, w, h, 8);
    ctx.stroke();
    
    // Left accent strip
    ctx.fillStyle = cat.color;
    roundRect(ctx, x, y, 4, h, [8, 0, 0, 8]);
    ctx.fill();
    
    // Icon + label
    ctx.font = 'bold 13px Segoe UI, sans-serif';
    ctx.fillStyle = cat.color;
    ctx.fillText(`${cat.icon} ${cat.label}`, x + 14, y + 18);
    
    // Count
    ctx.font = '11px Segoe UI, sans-serif';
    ctx.fillStyle = '#8b949e';
    ctx.textAlign = 'right';
    ctx.fillText(`${doneN}/${total}`, x + w - 10, y + 18);
    ctx.textAlign = 'left';
    
    // Progress bar
    const bx = x + 14, by = y + 26, bw = w - 24, bh = 7;
    ctx.fillStyle = '#30363d';
    roundRect(ctx, bx, by, bw, bh, 4);
    ctx.fill();
    if (pct > 0) {
      const g = ctx.createLinearGradient(bx, 0, bx + bw, 0);
      g.addColorStop(0, cat.color);
      g.addColorStop(1, lighten(cat.color, 30));
      ctx.fillStyle = g;
      roundRect(ctx, bx, by, bw * pct, bh, 4);
      ctx.fill();
    }
    
    // Quest items
    const itemStartY = y + 52;
    cat.quests.forEach((q, i) => {
      const isDone = done.has(cat.key + '::' + q);
      const iy = itemStartY + i * 18;
      
      // Checkbox
      ctx.strokeStyle = isDone ? '#2ea043' : '#30363d';
      ctx.lineWidth = 1.5;
      ctx.fillStyle = isDone ? '#2ea043' : 'transparent';
      roundRect(ctx, x + 14, iy - 10, 11, 11, 2);
      ctx.fill();
      ctx.stroke();
      if (isDone) {
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 8px Segoe UI,sans-serif';
        ctx.fillText('✓', x + 15.5, iy - 1);
      }
      
      // Quest name
      ctx.font = isDone ? '11px Segoe UI, sans-serif' : '11px Segoe UI, sans-serif';
      ctx.fillStyle = isDone ? '#4a5568' : '#c9d1d9';
      const maxW = w - 40;
      let name = q;
      ctx.font = '11px Segoe UI, sans-serif';
      while (ctx.measureText(name).width > maxW && name.length > 10) name = name.slice(0, -1);
      if (name !== q) name = name.slice(0, -1) + '…';
      ctx.fillText(name, x + 30, iy);
    });
  }
  
  function lighten(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.min(255, ((n >> 16) & 0xff) + amt);
    const g = Math.min(255, ((n >> 8) & 0xff) + amt);
    const b = Math.min(255, (n & 0xff) + amt);
    return `rgb(${r},${g},${b})`;
  }
  
  function roundRect(ctx, x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    const [tl, tr, br, bl] = r;
    ctx.beginPath();
    ctx.moveTo(x + tl, y);
    ctx.lineTo(x + w - tr, y);
    ctx.arcTo(x + w, y, x + w, y + tr, tr);
    ctx.lineTo(x + w, y + h - br);
    ctx.arcTo(x + w, y + h, x + w - br, y + h, br);
    ctx.lineTo(x + bl, y + h);
    ctx.arcTo(x, y + h, x, y + h - bl, bl);
    ctx.lineTo(x, y + tl);
    ctx.arcTo(x, y, x + tl, y, tl);
    ctx.closePath();
  }
  
  function downloadImg() {
    const canvas = document.getElementById('export-canvas');
    const date = new Date().toISOString().slice(0, 10);
    const a = document.createElement('a');
    a.download = `hfw-progress-${date}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  }
  
  // Close modal on overlay click
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeExport();
  });
  
  render();
</script>
